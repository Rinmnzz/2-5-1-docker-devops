name: CI/CD Tienda Perritos - Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1  

    - name: Login en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Backend y push a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        # USAREMOS ESTE SECRETO: Asegúrate de que en GitHub se llame ECR_REPO_URL_BACKEND y su valor sea 'backend'
        ECR_REPOSITORY: ${{ secrets.ECR_REPO_URL_BACKEND }} 
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Entramos a la carpeta para que Docker encuentre el package.json y el código
        cd backend
        
        # Validamos que el nombre del repo no esté vacío
        if [ -z "$ECR_REPOSITORY" ]; then echo "Error: ECR_REPO_URL_BACKEND está vacío"; exit 1; fi

        # Construimos la imagen (el punto final es el contexto dentro de /backend)
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        
        # Tagueamos como latest
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Push de ambas etiquetas
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    - name: Desplegar Backend vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Desplegando Backend version ${{ github.sha }}" \
          --parameters '{"commands":[
            "set -e",
            "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
            "docker pull ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_URL_BACKEND }}:${{ github.sha }}",
            "docker stop tienda-backend || true",
            "docker rm tienda-backend || true",
            "docker run -d --name tienda-backend -p 3001:3001 ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO_URL_BACKEND }}:${{ github.sha }}"
          ]}' \
          --output text